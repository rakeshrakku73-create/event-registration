<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIT Event Invitation Generator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="form-container">
    <h2>Invitation Generator</h2>

    <input type="text" id="title" placeholder="Event Title (e.g., CLOUD COMPUTING WORKSHOP)">
    <input type="text" id="subtitle" placeholder="Subtitle (e.g., Deep Dive into PaaS)">
    <textarea id="description" placeholder="Brief event description..."></textarea>

    <div class="row" style="display: flex; gap: 10px;">
        <input type="text" id="date" placeholder="Date (e.g., 15/04/2026)">
        <input type="text" id="time" placeholder="Time (e.g., 10:00 AM)">
        <input type="text" id="venue" placeholder="Venue (e.g., SJT Hall 222)">
    </div>

    <div class="row" style="display: flex; gap: 10px; margin-top: 10px;">
        <div style="flex: 1;">
            <label>Guest 1 Photo:</label>
            <input type="file" id="guest1Photo" accept="image/*">
            <input type="text" id="guest1Name" placeholder="Guest 1 Name">
            <input type="text" id="guest1Role" placeholder="Guest 1 Role">
        </div>
        <div style="flex: 1;">
            <label>Guest 2 Photo:</label>
            <input type="file" id="guest2Photo" accept="image/*">
            <input type="text" id="guest2Name" placeholder="Guest 2 Name">
            <input type="text" id="guest2Role" placeholder="Guest 2 Role">
        </div>
    </div>

    <div class="row" style="display: flex; gap: 10px; margin-top: 10px;">
        <input type="text" id="facultyName" placeholder="Faculty Coordinator">
        <input type="text" id="studentName" placeholder="Student Coordinator">
    </div>

    <button onclick="downloadPDF()" style="margin-top: 20px;">Download Official Invitation</button>
</div>

<script src="script.js"></script>
</body>
</html>
